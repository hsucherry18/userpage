<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ch11 表單練習(JavaScript)</title>

    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/20260527.css">
    <style>
        body {
            background: #eef3f8;
            font-family: "Microsoft JhengHei", "Segoe UI", sans-serif;
        }

        /* ---------- 標題 ---------- */

        .display-4 {
            background: linear-gradient(90deg, #1d4e89, #2563eb);
            color: #fff !important;
            border-radius: 10px;
            font-weight: bold;
            letter-spacing: 3px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, .15);
        }

        .display-5 {
            background: linear-gradient(90deg, #198754, #20c997);
            color: #fff !important;
            border-radius: 10px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0, 0, 0, .15);
        }

        /* ---------- 表單區 ---------- */

        .row.justify-content-center>.col-md-6:first-child {

            background: #fff;
            padding: 30px;
            border-radius: 12px;
            margin-top: 20px;

            box-shadow:
                0 5px 15px rgba(0, 0, 0, .08);
        }

        /* ---------- Label ---------- */

        .form-label,
        .form-floating label {
            color: #495057;
            font-weight: 600;
        }

        /* ---------- Input ---------- */

        .form-control,
        .form-select {

            border-radius: 8px;
            border: 1px solid #ced4da;
            transition: .3s;
        }

        .form-control:focus,
        .form-select:focus {

            border-color: #2563eb;
            box-shadow: 0 0 0 .2rem rgba(37, 99, 235, .18);
        }

        /* ---------- Checkbox Radio ---------- */

        .form-check {
            padding-top: 5px;
            padding-bottom: 5px;
        }

        .form-check-input {
            cursor: pointer;
        }

        .form-check-label {
            cursor: pointer;
        }

        /* ---------- 配料、供應方式 ---------- */

        #topping_group,
        #supply_group {

            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;

            border: 1px solid #dee2e6;
        }

        #topping_group.is-valid,
        #supply_group.is-valid {

            border: 2px solid #198754;
        }

        #topping_group.is-invalid,
        #supply_group.is-invalid {

            border: 2px solid #dc3545;
        }

        /* ---------- Button ---------- */

        .btn {

            border-radius: 8px;
            min-width: 110px;
            font-weight: bold;
            transition: .25s;
        }

        .btn-primary {

            background: #2563eb;
            border: none;
        }

        .btn-primary:hover {

            background: #1d4ed8;
            transform: translateY(-2px);
        }

        .btn-secondary {

            border: none;
        }

        .btn-secondary:hover {

            transform: translateY(-2px);
        }

        /* ---------- 明細 ---------- */

        #showmessage {

            background: #fff;

            margin-top: 20px;

            border-radius: 10px;

            padding: 25px;

            box-shadow: 0 5px 20px rgba(0, 0, 0, .08);

            border-left: 6px solid #2563eb;
        }

        #showmessage h3 {

            font-size: 20px;

            padding: 12px 0;

            margin: 0;

            border-bottom: 1px solid #e9ecef;
        }

        #showmessage h3:last-child {

            border-bottom: none;
        }

        /* ---------- 驗證 ---------- */

        .valid-feedback {

            font-weight: bold;
        }

        .invalid-feedback {

            font-weight: bold;
        }

        /* ---------- Switch ---------- */

        .form-switch .form-check-input {

            width: 3rem;

            height: 1.5rem;
        }

        /* ---------- 動畫 ---------- */

        .form-control,
        .form-select,
        .btn {

            transition: all .25s ease;
        }

        /* ---------- RWD ---------- */

        @media (max-width:768px) {

            .row.justify-content-center>.col-md-6:first-child {

                padding: 20px;
            }

            .display-4 {

                font-size: 2rem;
            }

            .display-5 {

                font-size: 1.7rem;
            }

            .btn {

                width: 100%;

                margin-top: 10px;
            }

            #showmessage h3 {

                font-size: 18px;
            }

        }
    </style>
</head>

<body class="bg-light">

    <div class="container pt-5">
        <div class="row justify-content-center">
            <div class="display-4 fw-900 text-center text-bg-primary py-2">
                飲料產品建檔
            </div>

            <div class="col-md-6 mt-3">

                <!-- 產品名稱 -->
                <div class="mb-3 form-floating">
                    <input type="text" class="form-control" id="pname">
                    <label for="pname">產品名稱(字數1~6)</label>
                    <div class="valid-feedback">產品名稱符合規定</div>
                    <div class="invalid-feedback">產品名稱不符合規定</div>
                </div>

                <!-- 數量 -->
                <div class="mb-3">
                    <label for="pnum" class="form-label">數量(1~10)</label>
                    <input type="number" class="form-control form-control-lg" id="pnum" min="1" max="10">
                    <div class="valid-feedback">數量符合規定</div>
                    <div class="invalid-feedback">數量不符合規定</div>
                </div>

                <!-- 規格 -->
                <div class="mb-3">
                    <label for="pstandard" class="form-label">產品規格</label>

                    <input type="text" class="form-control form-control-lg" id="pstandard" list="datalistoption"
                        placeholder="產品規格字數1~6">

                    <datalist id="datalistoption">
                        <option value="去冰"></option>
                        <option value="無糖"></option>
                        <option value="散裝"></option>
                    </datalist>

                    <div class="valid-feedback">規格符合規定</div>
                    <div class="invalid-feedback">規格不符合規定</div>
                </div>

                <!-- 容量 -->
                <div class="mb-3">
                    <select id="psize" class="form-select form-select-lg is-invalid">
                        <option value="" disabled selected>請選擇容量</option>
                        <option value="特大(2000cc以上)">特大(2000cc以上)</option>
                        <option value="大(1000cc-2000cc)">大(1000cc-2000cc)</option>
                        <option value="中(500cc-1000cc)">中(500cc-1000cc)</option>
                        <option value="小(500cc以下)">小(500cc以下)</option>
                    </select>

                    <div class="valid-feedback">已選擇容量</div>
                    <div class="invalid-feedback">請選擇容量</div>
                </div>

                <div class="mb-3 form-check form-switch">
                    <input type="checkbox" name="" id="pstatus" class="form-check-input" checked>
                    <label for="" class="form-check-label" id="pstatus_text">目前狀態:上架</label>
                </div>

                <div class="mb-3">
                    <div class="form-label fw-900"> 可加配料: 至少要加一個</div>
                    <div id="topping_group" class="is-invalid">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input topping_item" value="珍珠">
                            <label for="" class="form-check-label">珍珠</label>
                        </div>
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input topping_item" value="椰果">
                            <label for="" class="form-check-label">椰果</label>
                        </div>
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input topping_item" value="蒟蒻">
                            <label for="" class="form-check-label">蒟蒻</label>
                        </div>
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input topping_item" value="布丁">
                            <label for="" class="form-check-label">布丁</label>
                        </div>
                    </div>
                    <div class="valid-feedback">配料已選擇</div>
                    <div class="invalid-feedback">至少要加一個配料</div>
                </div>

                <div class="mb-3">
                    <div class="form-label fw-900"> 供應方式: 請選擇</div>
                    <div id="supply_group" class="is-invalid">
                        <div class="form-check form-check-inline">
                            <input type="radio" class="form-check-input supply_item" name="supply" value="冷飲">
                            <label for="" class="form-check-label">冷飲</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input type="radio" class="form-check-input supply_item" name="supply" value="熱飲">
                            <label for="" class="form-check-label">熱飲</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input type="radio" class="form-check-input supply_item" name="supply" value="冷熱皆可">
                            <label for="" class="form-check-label">冷熱皆可</label>
                        </div>
                    </div>
                    <div class="valid-feedback">已選擇供應方式</div>
                    <div class="invalid-feedback">未選擇供應方式</div>
                </div>

                <div class="text-end mt-4">
                    <button type="button" class="btn btn-secondary">取消</button>
                    <button type="button" class="btn btn-primary" id="ok_btn">確認</button>
                </div>

            </div>
        </div>

        <!-- 明細區(預設隱藏) -->
        <div id="s02" class="row mt-5 justify-content-center d-none">

            <div class="display-5 fw-900 text-center text-bg-success py-2 rounded-3">
                飲料產品建檔－明細確認
            </div>

            <div class="col-md-6">
                <div id="showmessage"></div>
                <div class="text-end mt-4" id="detail_btns">
                    <button type="button" class="btn btn-secondary" id="cancel_detail_btn">取消</button>
                    <button type="button" class="btn btn-primary" id="confirm_detail_btn">確認</button>
                </div>
            </div>

        </div>

    </div>

    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/jquery-4.0.0.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>

        let flag_pname = false;
        let flag_pnum = false;
        let flag_pstandard = false;
        let flag_psize = false;
        let flag_topping = false;
        let flag_supply = false;

        $(function () {

            //產品名稱
            $("#pname").on("input", function () {

                let pname = $(this).val().trim();

                if (pname.length >= 1 && pname.length <= 6) {

                    $(this).removeClass("is-invalid").addClass("is-valid");
                    flag_pname = true;

                } else {

                    $(this).removeClass("is-valid").addClass("is-invalid");
                    flag_pname = false;
                }

            });

            //數量
            $("#pnum").on("input", function () {

                let pnum = Number($(this).val());

                if (pnum >= 1 && pnum <= 10) {

                    $(this).removeClass("is-invalid").addClass("is-valid");
                    flag_pnum = true;

                } else {

                    $(this).removeClass("is-valid").addClass("is-invalid");
                    flag_pnum = false;
                }

            });

            //規格
            $("#pstandard").on("input", function () {

                let pstandard = $(this).val().trim();

                if (pstandard.length >= 1 && pstandard.length <= 6) {

                    $(this).removeClass("is-invalid").addClass("is-valid");
                    flag_pstandard = true;

                } else {

                    $(this).removeClass("is-valid").addClass("is-invalid");
                    flag_pstandard = false;
                }

            });

            //容量
            $("#psize").on("change", function () {

                if ($(this).val() != "") {

                    $(this).removeClass("is-invalid").addClass("is-valid");
                    flag_psize = true;

                } else {

                    $(this).removeClass("is-valid").addClass("is-invalid");
                    flag_psize = false;
                }

            });

            //監聽#pstatus
            $("#pstatus").on("change", function () {
                console.log($(this).prop("checked"));

                let pstatus = $(this).prop("checked");
                if (pstatus) {
                    $("#pstatus_text").text("目前狀態:上架");
                } else {
                    $("#pstatus_text").text("目前狀態:下架");
                }
            });

            //監聽.topping_item
            $(".topping_item").on("change", function () {
                console.log($(".topping_item:checked").length);
                let count = $(".topping_item:checked").length;
                if (count > 0) {
                    $("#topping_group").removeClass("is-invalid");
                    $("#topping_group").addClass("is-valid");

                    flag_topping = true;
                } else {
                    $("#topping_group").removeClass("is-valid");
                    $("#topping_group").addClass("is-invalid");

                    flag_topping = false;
                }
            });

            //監聽.supply_item
            $(".supply_item").on("change", function () {
                console.log($(".supply_item:checked").val());
                let supply = $(".supply_item:checked").val();
                if (supply != undefined) {
                    $("#supply_group").removeClass("is-invalid");
                    $("#supply_group").addClass("is-valid");

                    flag_supply = true;
                } else {
                    $("#supply_group").removeClass("is-valid");
                    $("#supply_group").addClass("is-invalid");

                    flag_supply = false;
                }
            });

            //確認按鈕
            $("#ok_btn").click(function () {
                if (flag_pname && flag_pnum && flag_pstandard && flag_psize && flag_topping) {
                    // 顯示明細
                    $("#s02").removeClass("d-none");
                    // 三元運算子 ? "": "" = if else 
                    let pstatus = $("#pstatus").prop("checked") ? "上架" : "下架";
                    //收集可加配料
                    let toppingArray = [];
                    $(".topping_item:checked").each(function () {
                        console.log($(this).val());
                        toppingArray.push($(this).val());
                    });
                    console.log(toppingArray);
                    //供應方式
                    let supply = $(".supply_item:checked").val();

                    let strHTML = `
                        <h3>產品名稱：${$("#pname").val()}</h3>
                        <h3>產品數量：${$("#pnum").val()}</h3>
                        <h3>產品規格：${$("#pstandard").val()}</h3>
                        <h3>容量：${$("#psize").val()}</h3>
                        <h3>目前狀態：${pstatus}</h3>
                        <h3>選取配料：${toppingArray.join(", ")}</h3>
                        <h3>供應方式：${supply}</h3>
                    `;

                    $("#showmessage").html(strHTML);

                } else {
                    Swal.fire({
                        title: "欄位錯誤",
                        text: "欄位錯誤，請修正",
                        icon: "error"
                    });
                    $("#s02").addClass("d-none");
                }

            });

        });

    </script>

</body>

</html>
