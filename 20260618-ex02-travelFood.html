<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ch6 切版練習</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/20260527.css">
    <style>
        .header {
            height: 200px;
            background-image: url(images/1.avif);
            background-position: center center;
            background-size: cover;
        }

        .navBox {
            height: 90px;
            margin-top: 15px;
            font-size: 48px;
            text-align: center;
            line-height: 90px;
            font-weight: 900;
            color: aliceblue;
        }

        .contentBox {
            border: none;
            border-radius: 12px;
            overflow: hidden;
            transition: all .3s;
        }

        .contentBox:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, .25);
        }

        .contentBox img {
            height: 250px;
            object-fit: cover;
        }

        @media screen and (min-width: 768px) {
            .navBox {
                height: 180px;
                line-height: 180px;
            }
        }

        @media screen and (min-width: 992px) {
            .navBox {
                width: 180px;
                border-radius: 50%;
            }
        }

        @media screen and (min-width: 1200px) {
            .navBox {
                width: 220px;
                height: 220px;
                line-height: 220px;
                border-radius: 50%;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="row">
            <div class="col-12 d-none d-sm-block">
                <div class="header bg-info"></div>
            </div>
        </div>
        <div class="row">
            <div class="col-sm-6 col-md-3">
                <div class="navBox bg-primary">選單01</div>
            </div>
            <div class="col-sm-6 col-md-3">
                <div class="navBox bg-primary">選單02</div>
            </div>
            <div class="col-sm-6 col-md-3">
                <div class="navBox bg-primary">選單03</div>
            </div>
            <div class="col-sm-6 col-md-3">
                <div class="navBox bg-primary">選單04</div>
            </div>
        </div>
        <div class="row" id="dataList">
            <div class="col-md-6 col-lg-4 mt-4">
                <div class="contentBox card h-100 shadow-sm roller-l">

                    <!-- 餐廳圖片 -->
                    <img src="images/1.avif" class="card-img-top" alt="餐廳圖片">

                    <div class="card-body d-flex flex-column">

                        <!-- 餐廳名稱 -->
                        <h4 class="card-title fw-bold text-primary mb-3">
                            森林咖啡廳
                        </h4>

                        <!-- 地址 -->
                        <p class="restaurant-address text-secondary mb-3">
                            📍 台中市西屯區台灣大道三段100號
                        </p>

                        <!-- 簡介 -->
                        <p class="card-text text-muted flex-grow-1">
                            森林咖啡館以自然綠意為主題，提供手沖咖啡、義大利麵與精緻甜點，
                            舒適寬敞的空間搭配大片落地窗，是聚餐、約會及享受悠閒下午茶的理想場所。
                        </p>

                        <!-- 按鈕 -->
                        <div class="roller_box text-center mt-3">
                            <a href="#" class="btn btn-primary px-4">
                                查看店家資訊
                            </a>
                        </div>

                    </div>
                </div>
            </div>
        </div>
        <script src="js/bootstrap.bundle.min.js"></script>
        <script src="js/jquery-4.0.0.js"></script>
        <script>
            $(function () {
                $.ajax({
                    type: "GET",
                    url: "http://localhost:3000/travelFood/",
                    dataType: "json",
                    success: function (data) {
                        console.log(data);
                        //1. 清洗資料，保留需要用到的欄位
                        //2. 將清洗後的資料渲染到AI產生的contentBox
                        const cleanData = data.map(function (item, index) {
                            let img = (item.PicURL ?? "").trim();
                            if (img == "") {
                                img = "images/ACL037300.jpg";
                            }
                            let name = (item.Name ?? "").trim();
                            if (name == "") {
                                name = "未提供名稱";
                            }
                            let city = (item.City ?? "").trim();
                            //地區
                            let town = (item.Town ?? "").trim();
                            //地址
                            let address = (item.Address ?? "").trim();
                            if (address == "") {
                                address = "未提供地址";
                            }
                            //合併
                            address = `${city}${town}${address}`;
                            let description = (item.HostWords ?? "").trim();
                            if (description == "") {
                                description = "未提供簡介";
                            }

                            return {
                                id: index + 1,
                                name: name,
                                img: img,
                                address: address,
                                description: description
                            }
                        });
                        console.log("清洗後的資料", cleanData);

                        cleanData.forEach(function (item) {
                            let strHTML = `<div class="col-md-6 col-lg-4 mt-4" >
                <div class="contentBox card h-100 shadow-sm roller-l">

                    <!-- 餐廳圖片 -->
                    <img src="${item.img}" class="card-img-top" alt="餐廳圖片">

                    <div class="card-body d-flex flex-column">

                        <!-- 餐廳名稱 -->
                        <h4 class="card-title fw-bold text-primary mb-3">
                            ${item.name}
                        </h4>

                        <!-- 地址 -->
                        <p class="restaurant-address text-secondary mb-3">
                            ${item.address}
                        </p>

                        <!-- 簡介 -->
                        <p class="card-text text-muted flex-grow-1">
                            ${item.description}
                        </p>

                        <!-- 按鈕 -->
                        <div class="roller_box text-center mt-3">
                            <a href="#" class="btn btn-primary px-4">
                                查看店家資訊
                            </a>
                        </div>

                    </div>
                </div>
            </div>`;
                            $("#dataList").append(strHTML);
                        });
                    },
                    error: function (err) {
                        console.log(err);
                    }
                });
            });
        </script>

</body>

</html>
